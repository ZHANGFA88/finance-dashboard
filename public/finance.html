<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinSight · 金融行情大屏</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #05070d;
    --bg2: #0a0e18;
    --panel: rgba(16, 22, 38, 0.72);
    --border: rgba(90, 130, 200, 0.18);
    --gold: #e8b866;
    --gold-dim: #a8853f;
    --cyan: #4fd6ff;
    --text: #d6e2f5;
    --text-dim: #6b7a95;
    --up: #ff4d5e;
    --down: #22d380;
  }
  html[data-theme="light"] {
    --bg: #eef2f8;
    --bg2: #f7f9fc;
    --panel: rgba(255, 255, 255, 0.82);
    --border: rgba(90, 130, 200, 0.28);
    --gold: #b8862f;
    --gold-dim: #96702a;
    --cyan: #1a94c4;
    --text: #1a2440;
    --text-dim: #6b7a95;
    --up: #e03444;
    --down: #12a566;
  }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    overflow: hidden;
  }
  /* 背景：径向光晕 + 网格 */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 20% 15%, rgba(79,214,255,0.08), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(232,184,102,0.07), transparent 45%),
      linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
    z-index: -2;
  }
  body::after {
    content: "";
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(90,130,200,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(90,130,200,0.05) 1px, transparent 1px);
    background-size: 44px 44px;
    z-index: -1;
    mask-image: radial-gradient(circle at 50% 40%, #000 55%, transparent 100%);
  }
  .layout {
    display: grid;
    grid-template-rows: 64px auto 1fr 32px;
    height: 100vh;
    padding: 14px 22px;
    gap: 12px;
  }
  /* A4 异动提示条 */
  .alert-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 0 16px; height: 40px;
    background: rgba(232,184,102,0.08);
    border: 1px solid rgba(232,184,102,0.25);
    border-radius: 10px; overflow: hidden;
  }
  .alert-bar.active {
    background: rgba(255,77,94,0.08);
    border-color: rgba(255,77,94,0.3);
    animation: alertGlow 2s ease-in-out infinite;
  }
  @keyframes alertGlow { 0%,100%{box-shadow:0 0 0 rgba(255,77,94,0);} 50%{box-shadow:0 0 16px rgba(255,77,94,0.25);} }
  .alert-icon { font-size: 16px; flex: 0 0 auto; }
  .alert-track { flex: 1; overflow: hidden; white-space: nowrap; position: relative; }
  .alert-track .alert-empty { color: var(--text-dim); font-size: 13px; }
  .alert-run { display: inline-block; white-space: nowrap; animation: alertScroll 30s linear infinite; }
  .alert-run:hover { animation-play-state: paused; }
  @keyframes alertScroll { from{transform:translateX(0);} to{transform:translateX(-50%);} }
  .alert-item { display: inline-flex; align-items: center; gap: 6px; margin-right: 34px; font-size: 13px; }
  .alert-item .a-name { color: var(--text); font-weight: 600; }
  .alert-item .a-win { color: var(--text-dim); font-size: 11px; }
  .alert-item.up .a-pct { color: var(--up); }
  .alert-item.down .a-pct { color: var(--down); }
  .alert-item .a-time { color: var(--text-dim); font-size: 11px; }
  /* 大盘指数条 */
  .index-bar { display: flex; align-items: center; gap: 18px; flex: 0 0 auto; margin-left: 12px;
    padding-left: 16px; border-left: 1px solid var(--border); }
  .index-bar .idx { display: flex; align-items: baseline; gap: 6px; white-space: nowrap; }
  .index-bar .idx-nm { font-size: 11px; color: var(--text-dim); }
  .index-bar .idx-v { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .index-bar .idx.up .idx-v { color: var(--up); }
  .index-bar .idx.down .idx-v { color: var(--down); }
  .index-bar .idx.flat .idx-v { color: var(--text-dim); }
  /* 加自选搜索框 */
  .add-watch { display: flex; align-items: center; gap: 6px; }
  .add-input { background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    color: var(--text); font-size: 12px; padding: 6px 10px; border-radius: 7px; width: 130px;
    outline: none; transition: border-color .15s, width .2s; }
  .add-input:focus { border-color: var(--cyan); width: 150px; }
  .add-input::placeholder { color: var(--text-dim); }
  .add-btn { background: rgba(79,214,255,0.12); border: 1px solid rgba(79,214,255,0.35);
    color: var(--cyan); font-size: 12px; padding: 6px 12px; border-radius: 7px; cursor: pointer;
    white-space: nowrap; transition: filter .15s; }
  .add-btn:hover { filter: brightness(1.25); }
  .add-btn:disabled { opacity: .5; cursor: default; }
  .icon-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    color: var(--text-dim); font-size: 15px; width: 34px; height: 32px; border-radius: 7px;
    cursor: pointer; line-height: 1; transition: filter .15s, border-color .15s; }
  .icon-btn:hover { border-color: var(--cyan); filter: brightness(1.2); }
  .icon-btn.on { background: rgba(79,214,255,0.15); border-color: rgba(79,214,255,0.4); }
  .toast { position: fixed; top: 78px; right: 24px; z-index: 200;
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 18px; font-size: 13px; color: var(--text); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    opacity: 0; transform: translateY(-8px); transition: opacity .25s, transform .25s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.ok { border-color: rgba(34,211,128,0.5); }
  .toast.err { border-color: rgba(255,77,94,0.5); }
  /* 自选卡片删除按钮 */
  .qcard .qdel { position: absolute; top: 6px; right: 8px; width: 18px; height: 18px;
    border-radius: 50%; border: none; background: rgba(255,255,255,0.08); color: var(--text-dim);
    font-size: 13px; line-height: 1; cursor: pointer; display: none; align-items: center;
    justify-content: center; padding: 0; }
  .qcard:hover .qdel { display: flex; }
  .qcard .qdel:hover { background: var(--up); color: #fff; }
  .qcard.dragging { opacity: .4; }
  .qcard.drag-over { border-color: var(--cyan); box-shadow: 0 0 12px rgba(79,214,255,0.3); }
  /* 顶部栏占位 */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    backdrop-filter: blur(8px);
  }
  .brand {
    display: flex; align-items: baseline; gap: 12px;
  }
  .brand .logo {
    font-size: 22px; font-weight: 800; letter-spacing: 2px;
    background: linear-gradient(90deg, var(--gold), #fff2d6, var(--gold));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .brand .sub { font-size: 12px; color: var(--text-dim); letter-spacing: 3px; }
  .topbar .slot { font-size: 13px; color: var(--text-dim); }
  /* S2 顶部状态栏 */
  .status-group { display: flex; align-items: center; gap: 22px; }
  .stat { display: flex; flex-direction: column; align-items: flex-end; line-height: 1.3; }
  .stat .k { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
  .stat .v { font-size: 15px; color: var(--text); font-variant-numeric: tabular-nums; }
  .clock .v { font-size: 20px; font-weight: 700; letter-spacing: 1px;
    background: linear-gradient(90deg, var(--cyan), #bfefff);
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  .fresh-dot { display: inline-flex; align-items: center; gap: 7px; }
  .fresh-dot .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--down);
    box-shadow: 0 0 8px var(--down); animation: pulse 1.8s ease-in-out infinite; }
  .fresh-dot.stale .dot { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
  .fresh-dot.off .dot { background: var(--text-dim); box-shadow: none; animation: none; }
  .fresh-dot .label { font-size: 14px; color: var(--text); }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.35;} }
  /* 主区：左侧栏 + 中间行情 + 右侧栏 */
  .main {
    display: grid;
    grid-template-columns: 260px 1fr 300px;
    gap: 12px;
    min-height: 0;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    backdrop-filter: blur(8px);
    position: relative;
    overflow: hidden;
  }
  .panel > .phead {
    padding: 12px 16px;
    font-size: 13px; letter-spacing: 2px; color: var(--gold);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .panel > .phead::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold); box-shadow: 0 0 8px var(--gold);
  }
  .pbody { padding: 16px; color: var(--text-dim); font-size: 13px; }
  .center { display: flex; flex-direction: column; }
  /* S3 行情卡片 */
  .quotes-scroll { flex: 1; overflow-y: auto; padding: 14px 16px; }
  .quotes-scroll::-webkit-scrollbar { width: 6px; }
  .quotes-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .cat-block { margin-bottom: 18px; }
  .cat-title { font-size: 12px; letter-spacing: 2px; color: var(--gold-dim);
    margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .cat-title::after { content: ""; flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--border), transparent); }
  .cat-title .cnt { color: var(--text-dim); font-size: 11px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
  .qcard { background: rgba(255,255,255,0.02); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; position: relative; overflow: hidden;
    transition: transform .15s, border-color .15s; cursor: pointer; }
  .qcard:hover { transform: translateY(-2px); border-color: rgba(90,130,200,0.4); }
  .qcard .qname { font-size: 14px; color: var(--text); font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .qcard .qsym { font-size: 10px; color: var(--text-dim); letter-spacing: .5px; margin-top: 1px; }
  .qcard .qprice { font-size: 22px; font-weight: 700; margin-top: 8px;
    font-variant-numeric: tabular-nums; }
  .qcard .qchg { font-size: 12px; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .qcard.up .qprice, .qcard.up .qchg { color: var(--up); }
  .qcard.down .qprice, .qcard.down .qchg { color: var(--down); }
  .qcard.flat .qprice { color: var(--text); }
  .qcard.flat .qchg { color: var(--text-dim); }
  .qcard .qbar { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .qcard.up .qbar { background: var(--up); box-shadow: 0 0 8px var(--up); }
  .qcard.down .qbar { background: var(--down); box-shadow: 0 0 8px var(--down); }
  .qcard.flat .qbar { background: var(--text-dim); }
  /* S7 涨跌闪动 + 陈旧变灰 */
  @keyframes flashUp { 0%{background:rgba(255,77,94,0.28);} 100%{background:rgba(255,255,255,0.02);} }
  @keyframes flashDown { 0%{background:rgba(34,211,128,0.28);} 100%{background:rgba(255,255,255,0.02);} }
  .qcard.flash-up { animation: flashUp .7s ease-out; }
  .qcard.flash-down { animation: flashDown .7s ease-out; }
  .qcard.stale { opacity: 0.5; filter: grayscale(0.7); }
  .qcard.stale::after { content: "陈旧"; position: absolute; top: 6px; right: 8px;
    font-size: 9px; color: var(--gold-dim); border: 1px solid var(--gold-dim);
    border-radius: 4px; padding: 0 4px; letter-spacing: 1px; }
  .qprice.tick { transition: color .3s; }
  .loading { color: var(--text-dim); font-size: 13px; text-align: center; padding: 30px; }
  .phead.syncing::before { animation: spin 0.6s linear; box-shadow: 0 0 12px var(--cyan); background: var(--cyan); }
  @keyframes spin { from{transform:scale(1);} 50%{transform:scale(1.8);} to{transform:scale(1);} }
  /* 底部状态条占位 */
  .statusbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 18px;
    font-size: 11px; color: var(--text-dim); letter-spacing: 1px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .ph-tag {
    display: inline-block; margin-top: 8px;
    padding: 2px 10px; border: 1px dashed var(--border); border-radius: 20px;
    font-size: 11px; color: var(--gold-dim);
  }
  /* S5 3D 地球 */
  .globe-wrap { display: flex; flex-direction: column; height: calc(100% - 44px); }
  .globe-stage { position: relative; flex: 0 0 auto; display: flex;
    align-items: center; justify-content: center; padding: 16px 12px 6px; }
  #globe { width: 216px; height: 216px; max-width: 100%;
    opacity: 0; transition: opacity .8s; cursor: grab; }
  #globe:active { cursor: grabbing; }
  #globe.ready { opacity: 1; }
  .globe-legend { padding: 4px 16px 0; }
  .globe-legend .row { display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; padding: 6px 0; border-bottom: 1px solid rgba(90,130,200,0.08); }
  .globe-legend .row:last-child { border-bottom: none; }
  .globe-legend .mk { display: flex; align-items: center; gap: 8px; color: var(--text-dim); }
  .globe-legend .mk .pin { width: 8px; height: 8px; border-radius: 50%;
    background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
  .globe-legend .cnt { color: var(--text); font-variant-numeric: tabular-nums; }
  /* 全球大盘指数列表 */
  .global-idx { flex: 1; overflow-y: auto; padding: 8px 14px 12px; min-height: 0; }
  .global-idx::-webkit-scrollbar { width: 6px; }
  .global-idx::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .gi-loading { color: var(--text-dim); font-size: 12px; text-align: center; padding: 16px; }
  .gi-grp { font-size: 10px; letter-spacing: 2px; color: var(--gold-dim); margin: 8px 0 5px; }
  .gi-grp:first-child { margin-top: 0; }
  .gi-row { display: flex; align-items: center; justify-content: space-between;
    padding: 5px 8px; border-radius: 7px; transition: background .15s; }
  .gi-row:hover { background: rgba(255,255,255,0.04); }
  .gi-nm { font-size: 12px; color: var(--text); display: flex; align-items: center; gap: 6px; }
  .gi-nm .live { width: 6px; height: 6px; border-radius: 50%; background: var(--down);
    box-shadow: 0 0 6px var(--down); }
  .gi-nm .live.closed { background: var(--text-dim); box-shadow: none; }
  .gi-val { text-align: right; }
  .gi-price { font-size: 12px; color: var(--text); font-variant-numeric: tabular-nums; }
  .gi-pct { font-size: 11px; font-variant-numeric: tabular-nums; }
  .gi-row.up .gi-pct { color: var(--up); }
  .gi-row.down .gi-pct { color: var(--down); }
  .gi-row.flat .gi-pct { color: var(--text-dim); }  /* S6 盘面动态(涨跌榜) */
  .movers { padding: 12px 14px; overflow-y: auto; height: calc(100% - 44px); }
  .movers::-webkit-scrollbar { width: 6px; }
  .movers::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .movers .mv-sec { font-size: 11px; letter-spacing: 2px; color: var(--gold-dim); margin: 6px 0 8px; }
  .movers .mv-row { display: flex; align-items: center; justify-content: space-between;
    padding: 7px 8px; border-radius: 8px; cursor: pointer; transition: background .15s; }
  .movers .mv-row:hover { background: rgba(255,255,255,0.04); }
  .movers .mv-nm { font-size: 12px; color: var(--text); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
  .movers .mv-pct { font-size: 12px; font-variant-numeric: tabular-nums; }
  .movers .mv-row.up .mv-pct { color: var(--up); }
  .movers .mv-row.down .mv-pct { color: var(--down); }
  .movers .mv-row.flat .mv-pct { color: var(--text-dim); }
  /* 右栏上下分区 + 板块面板 */
  .side-right { display: flex; flex-direction: column; }
  .side-right .movers { flex: 1 1 45%; min-height: 0; }
  .sector-head { margin-top: 0; border-top: 1px solid var(--border); }
  .sec-tabs { margin-left: auto; display: flex; gap: 4px; }
  .sec-tab { background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    color: var(--text-dim); font-size: 10px; padding: 2px 8px; border-radius: 5px; cursor: pointer; }
  .sec-tab.active { background: var(--gold-dim); color: #1a1206; border-color: var(--gold); }
  .sectors { flex: 1 1 55%; min-height: 0; overflow-y: auto; padding: 10px 14px; }
  .sectors::-webkit-scrollbar { width: 6px; }
  .sectors::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .sec-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 8px;
    transition: background .15s; }
  .sec-row:hover { background: rgba(255,255,255,0.04); }
  .sec-nm { font-size: 12px; color: var(--text); flex: 1; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  .sec-bar-wrap { flex: 0 0 60px; height: 5px; background: rgba(255,255,255,0.05);
    border-radius: 3px; overflow: hidden; }
  .sec-bar { height: 100%; border-radius: 3px; }
  .sec-row.up .sec-bar { background: var(--up); }
  .sec-row.down .sec-bar { background: var(--down); }
  .sec-pct { font-size: 12px; font-variant-numeric: tabular-nums; flex: 0 0 52px; text-align: right; }
  .sec-row.up .sec-pct { color: var(--up); }
  .sec-row.down .sec-pct { color: var(--down); }
  .sec-row.flat .sec-pct { color: var(--text-dim); }
  /* S6 K线弹窗 */
  .modal-mask { position: fixed; inset: 0; background: rgba(3,5,10,0.82);
    backdrop-filter: blur(6px); z-index: 100; display: none;
    align-items: center; justify-content: center; }
  .modal-mask.show { display: flex; }
  .modal-box { width: min(880px, 92vw); background: var(--bg2);
    border: 1px solid var(--border); border-radius: 16px; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
  .modal-head { display: flex; align-items: center; gap: 18px; padding: 16px 20px;
    border-bottom: 1px solid var(--border); }
  .modal-head .mtitle { display: flex; flex-direction: column; }
  .modal-head .mname { font-size: 18px; font-weight: 700; color: var(--text); }
  .modal-head .msym { font-size: 11px; color: var(--text-dim); }
  .modal-head .mprice { display: flex; flex-direction: column; }
  .modal-head .mp { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .modal-head .mc { font-size: 12px; font-variant-numeric: tabular-nums; }
  .modal-head.up .mp, .modal-head.up .mc { color: var(--up); }
  .modal-head.down .mp, .modal-head.down .mc { color: var(--down); }
  .modal-head .mperiods { margin-left: auto; display: flex; gap: 6px; }
  .pbtn { background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    color: var(--text-dim); font-size: 12px; padding: 5px 12px; border-radius: 7px; cursor: pointer; }
  .pbtn.active { background: var(--gold-dim); color: #1a1206; border-color: var(--gold); }
  .mclose { background: none; border: none; color: var(--text-dim); font-size: 20px;
    cursor: pointer; padding: 0 4px; }
  .mclose:hover { color: var(--text); }
  .modal-body { position: relative; padding: 16px 20px 22px; }
  #klineCanvas { width: 100%; height: 380px; display: block; }
  .kloading { position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; color: var(--text-dim); font-size: 14px; }
  /* B4 分析面板 Tab */
  .mtabs { display: flex; gap: 8px; padding: 10px 20px 0; border-bottom: 1px solid var(--border); }
  .mtab { background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--text-dim); font-size: 13px; padding: 8px 4px; cursor: pointer; }
  .mtab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .tab-pane { display: none; }
  .tab-pane.show { display: block; }
  .an-loading { display: flex; align-items: center; justify-content: center;
    min-height: 200px; color: var(--text-dim); font-size: 14px; }
  .an-content { font-size: 13px; }
  .an-verdict { display: flex; align-items: center; gap: 14px; padding: 14px 16px;
    border-radius: 10px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); margin-bottom: 14px; }
  .an-stance { font-size: 22px; font-weight: 800; }
  .an-stance.bull { color: var(--up); }
  .an-stance.bear { color: var(--down); }
  .an-stance.neutral { color: var(--gold); }
  .an-meta { display: flex; flex-direction: column; gap: 3px; color: var(--text-dim); font-size: 12px; }
  .an-meta b { color: var(--text); font-size: 13px; }

  .cyq-metrics .an-cell { padding: 8px 10px; border-radius: 7px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); }

  .cyq-metrics .cv { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .cyq-metrics .cv.up { color: var(--up); } .cyq-metrics .cv.down { color: var(--down); }
  #cyqCanvas { width: 100%; height: 300px; display: block; }

    color: #1a1206; font-size: 12px; padding: 6px 16px; border-radius: 7px; cursor: pointer; font-weight: 600; }
  .cyq-retry:hover { filter: brightness(1.1); }
  /* 移动端响应式 */
  @media (max-width: 1100px) {

</head>
<body>
  <div class="toast" id="toast"></div>
  <div class="layout">
    <!-- 顶部栏（S2 将填充时钟/新鲜度） -->
    <header class="topbar">
      <div class="brand">

      </div>
      <div class="status-group">
        <div class="add-watch">
          <input id="addInput" class="add-input" placeholder="加自选 如 600519.SS" spellcheck="false" autocomplete="off">
          <button id="addBtn" class="add-btn">+ 加入</button>

        <button id="soundBtn" class="icon-btn" title="异动声音提醒">🔕</button>

        <div class="stat fresh-dot off" id="freshBox" title="数据新鲜度">
          <span class="k">数据状态</span>
          <span class="fresh-dot off"><span class="dot"></span><span class="label" id="freshLabel">连接中…</span></span>
        </div>
        <div class="stat"><span class="k">更新于</span><span class="v" id="updatedAt">--:--:--</span></div>
        <div class="stat clock"><span class="k">北京时间</span><span class="v" id="clock">--:--:--</span></div>
      </div>
    </header>

    <!-- A4: 异动提示条 -->
    <div class="alert-bar" id="alertBar">
      <span class="alert-icon">🚨</span>
      <div class="alert-track" id="alertTrack"><span class="alert-empty">盘面平静，暂无异动</span></div>
      <div class="index-bar" id="indexBar"></div>
    </div>

    <!-- 主区 -->
    <div class="main">
      <aside class="panel side-left">
        <div class="phead">市场概览</div>

          <div class="globe-stage"><canvas id="globe"></canvas></div>
          <div class="globe-legend" id="globeLegend"></div>

        </div>

      <section class="panel center">

      <aside class="panel side-right">

        <div class="movers" id="moversWrap">
          <div class="loading">加载中…</div>
        </div>
        <div class="phead sector-head">板块热点<span class="sec-tabs"><button class="sec-tab active" data-kind="concept">概念</button><button class="sec-tab" data-kind="industry">行业</button></span></div>

          <div class="loading">加载中…</div>
        </div>
      </aside>

    <!-- 底部状态条 -->

      <span>FinSight · 个人盯盘工作站</span>
      <span id="botSlot">行情 / 异动 / 分析 / 筹码 · 端口 8770</span>
    </footer>
  </div>

  <!-- S6: K线弹窗 -->
  <div class="modal-mask" id="klineModal">
    <div class="modal-box">
      <div class="modal-head">
        <div class="mtitle">
          <span class="mname" id="kName">--</span>
          <span class="msym" id="kSym">--</span>
        </div>
        <div class="mprice">
          <span class="mp" id="kPrice">--</span>
          <span class="mc" id="kChg">--</span>
        </div>
        <div class="mperiods">
          <button data-period="daily" class="pbtn active">日K</button>
          <button data-period="weekly" class="pbtn">周K</button>
          <button data-period="monthly" class="pbtn">月K</button>
        </div>

      </div>

        <button class="mtab active" data-tab="chart">📈 K线</button>
        <button class="mtab" data-tab="analyze">🔍 深度分析</button>
        <button class="mtab" data-tab="cyq">🎰 筹码</button>
      </div>
      <div class="modal-body">
        <div class="tab-pane show" id="paneChart">
          <canvas id="klineCanvas"></canvas>
          <div class="kloading" id="kLoading">K线加载中…</div>
        </div>
        <div class="tab-pane" id="paneAnalyze">
          <div class="an-loading" id="anLoading">分析加载中…</div>
          <div class="an-content" id="anContent" style="display:none"></div>
        </div>
        <div class="tab-pane" id="paneCyq">
          <div class="an-loading" id="cyqLoading">筹码加载中…</div>
          <div class="cyq-content" id="cyqContent" style="display:none">
            <div class="cyq-metrics" id="cyqMetrics"></div>
            <canvas id="cyqCanvas"></canvas>
            <div class="cyq-note">数据来源：东财筹码分布（T+1 盘后更新）。成本区间带为 90% 筹码分布，无日K线标注</div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  // S2: 实时时钟 + 数据新鲜度
  const pad = n => String(n).padStart(2, '0');
  function fmtTime(d) { return pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds()); }
  function fmtDate(d) { return (d.getMonth()+1) + '月' + d.getDate() + '日 周' + '日一二三四五六'[d.getDay()]; }

  const elClock = document.getElementById('clock');
  function tickClock() {
    // 北京时间 UTC+8
    const now = new Date(Date.now() + (new Date().getTimezoneOffset() + 480) * 60000);
    elClock.textContent = fmtTime(now);
  }
  tickClock();
  setInterval(tickClock, 1000);

  // 顶层 ts / fresh 新鲜度指示（S4 已合并到统一轮询）
  const freshBox = document.getElementById('freshBox');
  const freshLabel = document.getElementById('freshLabel');
  const updatedAt = document.getElementById('updatedAt');
  function updateFresh(d) {
    const box = freshBox.querySelector('.fresh-dot');
    if (d && d.ts) {
      const t = new Date((d.ts) * 1000 + (new Date().getTimezoneOffset() + 480) * 60000);
      updatedAt.textContent = fmtTime(t);
      const ageSec = Math.max(0, Math.floor(Date.now()/1000 - d.ts));
      if (d.fresh === false || ageSec > 120) {
        box.className = 'fresh-dot stale';
        freshLabel.textContent = '数据较旧 · ' + ageSec + 's前';
      } else {
        box.className = 'fresh-dot';
        freshLabel.textContent = '实时 · ' + (d.total || 0) + '只';
      }
    } else {
      box.className = 'fresh-dot off';
      freshLabel.textContent = '无数据';
    }
  }
  function freshError() {
    freshBox.querySelector('.fresh-dot').className = 'fresh-dot off';
    freshLabel.textContent = '连接失败';
  }

  // S3: 行情卡片渲染（涨红跌绿）
  const CAT_NAME = { cn:'A股', hk:'港股', us:'美股', etf:'ETF', crypto:'加密', fx:'外汇' };
  const CAT_ORDER = ['cn','hk','us','etf','crypto','fx'];
  const quotesWrap = document.getElementById('quotesWrap');

  function fmtPrice(p) {
    if (p == null) return '--';
    if (p >= 1000) return p.toLocaleString('en-US', {maximumFractionDigits: 2});
    return p.toFixed(2);
  }
  const prevPrices = {};
  function renderQuotes(items) {
    if (!items || !items.length) { quotesWrap.innerHTML = '<div class="loading">暂无行情数据</div>'; return; }
    const now = Math.floor(Date.now()/1000);
    const g = {};
    items.forEach(it => { (g[it.market] = g[it.market] || []).push(it); });
    let html = '';
    CAT_ORDER.forEach(cat => {
      const list = g[cat];
      if (!list || !list.length) return;
      html += '<div class="cat-block"><div class="cat-title">' + (CAT_NAME[cat]||cat) +
              '<span class="cnt">' + list.length + '</span></div><div class="cards">';
      list.forEach(it => {
        const pct = it.change_pct || 0;
        const cls = pct > 0 ? 'up' : (pct < 0 ? 'down' : 'flat');
        const arrow = pct > 0 ? '▲' : (pct < 0 ? '▼' : '—');
        const sign = pct > 0 ? '+' : '';
        const stale = (now - (it.ts||0)) > 120 ? ' stale' : '';
        html += '<div class="qcard ' + cls + stale + '" draggable="true" data-symbol="' + it.symbol + '">' +
          '<span class="qbar"></span>' +
          '<button class="qdel" data-del="' + it.symbol + '" title="移除自选">×</button>' +
          '<div class="qname">' + (it.name||it.symbol) + '</div>' +
          '<div class="qsym">' + it.symbol + '</div>' +
          '<div class="qprice">' + fmtPrice(it.price) + '</div>' +
          '<div class="qchg">' + arrow + ' ' + sign + pct.toFixed(2) + '%  ' +
            sign + (it.change_amt!=null? it.change_amt.toFixed(2):'--') + '</div>' +
        '</div>';
      });
      html += '</div></div>';
    });
    quotesWrap.innerHTML = html || '<div class="loading">暂无行情数据</div>';
    // S7: 价格变化 → 闪动
    items.forEach(it => {
      const prev = prevPrices[it.symbol];
      if (prev != null && it.price != null && it.price !== prev) {
        const card = quotesWrap.querySelector('.qcard[data-symbol="' + (window.CSS && CSS.escape ? CSS.escape(it.symbol) : it.symbol) + '"]');
        if (card) {
          const dir = it.price > prev ? 'flash-up' : 'flash-down';
          card.classList.remove('flash-up','flash-down');
          void card.offsetWidth; // 重启动画
          card.classList.add(dir);
        }
      }
      if (it.price != null) prevPrices[it.symbol] = it.price;
    });
  }
  // S4: 统一 15s 轮询（行情 + 新鲜度一次拉取）
  const REFRESH_MS = 15000;
  let lastItems = [];
  const phead = document.querySelector('.center .phead');
  let polling = false;
  async function refreshAll() {
    if (polling) return;
    polling = true;
    if (phead) phead.classList.add('syncing');
    try {
      const r = await fetch('/api/finance/quotes');
      const d = await r.json();
      updateFresh(d);
      renderQuotes(d.items || []);
      updateGlobeLegend(d.items || []);
      lastItems = d.items || [];
      renderMovers(lastItems);
    } catch (e) {
      freshError();
      if (!quotesWrap.querySelector('.qcard')) quotesWrap.innerHTML = '<div class="loading">行情加载失败，下次自动重试…</div>';
    } finally {
      if (phead) setTimeout(() => phead.classList.remove('syncing'), 400);
      polling = false;
    }
  }
  refreshAll();
  setInterval(refreshAll, REFRESH_MS);
  // 页面重新可见时立即刷一次
  document.addEventListener('visibilitychange', () => { if (!document.hidden) refreshAll(); });

  // 大盘指数条
  const indexBar = document.getElementById('indexBar');
  async function refreshIndices() {
    try {
      const r = await fetch('/api/finance/indices');
      const d = await r.json();
      if (!d.ok || !d.items || !d.items.length) return;
      indexBar.innerHTML = d.items.map(i => {
        const p = i.change_pct || 0;
        const cls = p > 0 ? 'up' : (p < 0 ? 'down' : 'flat');
        const sign = p > 0 ? '+' : '';
        return '<div class="idx ' + cls + '"><span class="idx-nm">' + i.name + '</span>' +
          '<span class="idx-v">' + sign + p.toFixed(2) + '%</span></div>';
      }).join('');
    } catch (e) {}
  }
  refreshIndices();
  setInterval(refreshIndices, 30000);

  // 全球大盘指数（美股/夜盘/恒生/日经/欧股/加密）
  const globalIdxEl = document.getElementById('globalIdx');
  const GI_GRP = { us:'美股', us_night:'美股夜盘期货', hk:'港股', asia:'亚太', eu:'欧洲', crypto:'加密货币' };
  const GI_ORDER = ['us','us_night','hk','asia','eu','crypto'];
  async function refreshGlobal() {
    try {
      const r = await fetch('/api/finance/global');
      const d = await r.json();
      const items = d.items || [];
      if (!items.length) { globalIdxEl.innerHTML = '<div class="gi-loading">全球大盘获取中…（数据源限流中）</div>'; return; }
      const grp = {};
      items.forEach(it => { (grp[it.market] = grp[it.market] || []).push(it); });
      let html = '';
      GI_ORDER.forEach(g => {
        const list = grp[g]; if (!list || !list.length) return;
        html += '<div class="gi-grp">' + (GI_GRP[g]||g) + '</div>';
        list.forEach(it => {
          const p = it.change_pct || 0;
          const cls = p > 0 ? 'up' : (p < 0 ? 'down' : 'flat');
          const sign = p > 0 ? '+' : '';
          const live = (it.state === 'REGULAR' || g === 'crypto' || g === 'us_night') ? '' : ' closed';
          html += '<div class="gi-row ' + cls + '">' +
            '<span class="gi-nm"><span class="live' + live + '"></span>' + it.name + '</span>' +
            '<span class="gi-val"><span class="gi-price">' + it.price.toLocaleString() + '</span> ' +
            '<span class="gi-pct">' + sign + p.toFixed(2) + '%</span></span></div>';
        });
      });
      globalIdxEl.innerHTML = html;
    } catch (e) {
      globalIdxEl.innerHTML = '<div class="gi-loading">全球大盘加载失败</div>';
    }
  }
  refreshGlobal();
  setInterval(refreshGlobal, 60000);

  // 板块热点
  const sectorsWrap = document.getElementById('sectorsWrap');
  let sectorKind = 'concept';
  async function refreshSectors() {
    try {
      const r = await fetch('/api/finance/sectors?kind=' + sectorKind);
      const d = await r.json();
      const items = d.items || [];
      if (!items.length) { sectorsWrap.innerHTML = '<div class="loading">暂无板块数据（非A股时段或数据源繁忙）</div>'; return; }
      const maxAbs = Math.max.apply(null, items.map(x => Math.abs(x.change_pct || 0))) || 1;
      sectorsWrap.innerHTML = items.map(x => {
        const p = x.change_pct || 0;
        const cls = p > 0 ? 'up' : (p < 0 ? 'down' : 'flat');
        const sign = p > 0 ? '+' : '';
        const w = Math.min(100, Math.abs(p) / maxAbs * 100);
        return '<div class="sec-row ' + cls + '"><span class="sec-nm">' + (x.name||'--') + '</span>' +
          '<span class="sec-bar-wrap"><span class="sec-bar" style="width:' + w + '%"></span></span>' +
          '<span class="sec-pct">' + sign + p.toFixed(2) + '%</span></div>';
      }).join('');
    } catch (e) {
      sectorsWrap.innerHTML = '<div class="loading">板块加载失败</div>';
    }
  }
  document.querySelectorAll('.sec-tab').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('.sec-tab').forEach(x => x.classList.remove('active'));
    b.classList.add('active'); sectorKind = b.dataset.kind; refreshSectors();
  }));
  refreshSectors();
  setInterval(refreshSectors, 60000);

  // 搜索加自选 / 删自选
  const toastEl = document.getElementById('toast');
  let toastTimer = null;
  function showToast(msg, kind) {
    toastEl.textContent = msg;
    toastEl.className = 'toast show ' + (kind || '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toastEl.className = 'toast ' + (kind || ''); }, 2600);
  }
  const addInput = document.getElementById('addInput');
  const addBtn = document.getElementById('addBtn');
  async function addWatch() {
    const sym = (addInput.value || '').trim().toUpperCase();
    if (!sym) { addInput.focus(); return; }
    addBtn.disabled = true; addBtn.textContent = '添加中';
    try {
      const r = await fetch('/api/finance/watchlist/add', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ symbol: sym })
      });
      const d = await r.json();
      if (d.ok) {
        showToast('已加入自选：' + (d.name || sym), 'ok');
        addInput.value = '';
        refreshAll();
      } else {
        showToast(d.error || '添加失败', 'err');
      }
    } catch (e) {
      showToast('网络错误，稍后重试', 'err');
    } finally {
      addBtn.disabled = false; addBtn.textContent = '+ 加入';
    }
  }
  async function removeWatch(sym) {
    if (!sym) return;
    try {
      const r = await fetch('/api/finance/watchlist/remove', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ symbol: sym })
      });
      const d = await r.json();
      if (d.ok) { showToast('已移除：' + sym, 'ok'); refreshAll(); }
      else showToast(d.error || '移除失败', 'err');
    } catch (e) { showToast('网络错误', 'err'); }
  }
  addBtn.addEventListener('click', addWatch);
  addInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addWatch(); });

  // 异动声音提醒
  let soundOn = localStorage.getItem('fs_sound') === '1';
  const soundBtn = document.getElementById('soundBtn');
  function syncSoundBtn() { soundBtn.textContent = soundOn ? '🔔' : '🔕'; soundBtn.classList.toggle('on', soundOn); }
  syncSoundBtn();
  let audioCtx = null;
  function playBeep(direction) {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.value = direction === 'up' ? 880 : 520;

  const globeState = { markers: [{location:[31.23,121.47],size:0.06},{location:[40.71,-74.01],size:0.07},{location:[22.32,114.17],size:0.06}] };
  let globeInited = false;
  let earthInstance = null;
  function initGlobe(attempt) {
    attempt = attempt || 0;
    const canvas = document.getElementById('globe');
    if (!canvas || typeof window.createGlobe !== 'function') return;
    if (globeInited) return;
    // canvas 自身 CSS 尺寸（固定 216×216 正方形），照搬 jarvis-ai-monitor 可用写法
    const cw = canvas.clientWidth || 216;
    const ch = canvas.clientHeight || cw;
    if (cw < 40 && attempt < 20) {
      return requestAnimationFrame(() => initGlobe(attempt + 1));
    }
    globeInited = true;
    // 关键：显式设置 canvas 像素缓冲区 = 2倍（之前漏了这一步，导致糊球）
    canvas.width = cw * 2;
    canvas.height = ch * 2;

    let phi = 0;
    let theta = 0.3;
    let dragging = false;
    let lastX = 0, lastY = 0;

    // 参数照搬 jarvis-ai-monitor（你那个能用的项目）
    earthInstance = window.createGlobe(canvas, {
      devicePixelRatio: 2,
      width: canvas.width,
      height: canvas.height,
      phi: 0,
      theta: 0.3,
      dark: 1,
      diffuse: 1.5,
      mapSamples: 16000,
      mapBrightness: 6,
      baseColor: [0.1, 0.25, 0.45],
      markerColor: [0.4, 0.75, 1.0],
      glowColor: [0.2, 0.6, 1.0],
      markers: globeState.markers,
      markerElevation: 0.02,
    });

    // 动画循环：自旋转 + 拖拽（照搬 jarvis）
    function animate() {
      if (!dragging) phi += 0.003;
      earthInstance.update({ phi: phi, theta: theta });
      requestAnimationFrame(animate);
    }
    animate();

    function onDown(e){ dragging = true; lastX = e.touches ? e.touches[0].clientX : e.clientX; lastY = e.touches ? e.touches[0].clientY : e.clientY; }
    function onMove(e){
      if (!dragging) return;
      const x = e.touches ? e.touches[0].clientX : e.clientX;
      const y = e.touches ? e.touches[0].clientY : e.clientY;
      phi += (x - lastX) * 0.005;
      theta = Math.max(-1.2, Math.min(1.2, theta + (y - lastY) * 0.005));
      lastX = x; lastY = y;
    }
    function onUp(){ dragging = false; }
    canvas.addEventListener('mousedown', onDown);
    canvas.addEventListener('mousemove', onMove);
    canvas.addEventListener('mouseup', onUp);
    canvas.addEventListener('mouseleave', onUp);
    canvas.addEventListener('touchstart', onDown, { passive: true });
    canvas.addEventListener('touchmove', onMove, { passive: true });
    canvas.addEventListener('touchend', onUp);

    requestAnimationFrame(() => canvas.classList.add('ready'));
  }

  function drawCyq(series) {
    const cv = document.getElementById('cyqCanvas');
    const dpr = Math.min(window.devicePixelRatio||1, 2);
    const cssW = cv.clientWidth || 800, cssH = 300;
    cv.width = cssW * dpr; cv.height = cssH * dpr;
    const ctx = cv.getContext('2d');
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,cssW,cssH);
    if (!series.length) return;
    const padL = 56, padR = 16, padT = 14, padB = 28;
    const w = cssW - padL - padR, h = cssH - padT - padB;
    const lows = series.map(s=>s.low_90).filter(v=>v!=null);
    const highs = series.map(s=>s.high_90).filter(v=>v!=null);
    if (!lows.length) return;
    let max = Math.max(...highs), min = Math.min(...lows);
    const range = (max-min)||1; max += range*0.08; min -= range*0.08;
    const yOf = v => padT + h - (v-min)/(max-min)*h;
    const n = series.length, cw = w / n;
    const xOf = i => padL + cw*(i+0.5);
    // 网格 + Y轴
    ctx.strokeStyle = 'rgba(90,130,200,0.12)'; ctx.fillStyle = '#6b7a95'; ctx.font = '11px sans-serif';
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    for (let i=0;i<=4;i++){
      const v = min + (max-min)*i/4, y = yOf(v);
      ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(padL+w,y); ctx.stroke();
      ctx.fillText(v.toFixed(2), padL-6, y);
    }
    // X轴日期(首/中/尾)
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    [0, Math.floor(n/2), n-1].forEach(i => {
      if (series[i] && series[i].date) ctx.fillText(series[i].date, xOf(i), padT+h+6);
    });
    // 90%成本区间带状（面积填充 high_90..low_90）
    ctx.beginPath();
    for (let i=0;i<n;i++){ const s=series[i]; if(s.high_90==null)continue; const x=xOf(i),y=yOf(s.high_90); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); }
    for (let i=n-1;i>=0;i--){ const s=series[i]; if(s.low_90==null)continue; ctx.lineTo(xOf(i),yOf(s.low_90)); }
    ctx.closePath();
    ctx.fillStyle = 'rgba(212,175,90,0.15)'; ctx.fill();
    // 平均成本线
    ctx.strokeStyle = '#d4af5a'; ctx.lineWidth = 1.8; ctx.beginPath();
    let started=false;
    for (let i=0;i<n;i++){ const s=series[i]; if(s.avg_cost==null)continue; const x=xOf(i),y=yOf(s.avg_cost); started?ctx.lineTo(x,y):(ctx.moveTo(x,y),started=true); }
    ctx.stroke();
    // 图例
    ctx.fillStyle = '#d4af5a'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText('— 平均成本', padL+4, padT+2);
    ctx.fillStyle = 'rgba(212,175,90,0.5)';
    ctx.fillText('▭ 90%成本区间', padL+84, padT+2);
  }

  function drawKline(k) {
    const dpr = Math.min(window.devicePixelRatio||1, 2);
    const cssW = kCanvas.clientWidth || 800, cssH = 380;
    kCanvas.width = cssW * dpr; kCanvas.height = cssH * dpr;
    const ctx = kCanvas.getContext('2d');
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,cssW,cssH);
    if (!k.length) return;
    const padL = 56, padR = 16, padT = 16, padB = 28;
    const w = cssW - padL - padR, h = cssH - padT - padB;
    const highs = k.map(d=>d.high), lows = k.map(d=>d.low);
    let max = Math.max(...highs), min = Math.min(...lows);
    const range = (max-min)||1; max += range*0.05; min -= range*0.05;
    const yOf = v => padT + h - (v-min)/(max-min)*h;
    const n = k.length;
    const cw = w / n;
    // 网格 + Y轴刻度
    ctx.strokeStyle = 'rgba(90,130,200,0.12)'; ctx.fillStyle = '#6b7a95'; ctx.font = '11px sans-serif';
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    for (let i=0;i<=4;i++){
      const v = min + (max-min)*i/4, y = yOf(v);
      ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(padL+w,y); ctx.stroke();
      ctx.fillText(v.toFixed(2), padL-6, y);
    }
    // X轴日期(首/中/尾)
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    [0, Math.floor(n/2), n-1].forEach(i => {
      if (k[i]) ctx.fillText(k[i].date, padL + cw*(i+0.5), padT+h+6);
    });
    // 蜡烛图
    const upC = '#ff4d5e', downC = '#22d380';
    for (let i=0;i<n;i++){
      const d = k[i]; const up = d.close >= d.open;
      const col = up ? upC : downC;
      const x = padL + cw*(i+0.5);
      ctx.strokeStyle = col; ctx.fillStyle = col;
      // 影线
      ctx.beginPath(); ctx.moveTo(x, yOf(d.high)); ctx.lineTo(x, yOf(d.low)); ctx.stroke();
      // 实体
      const bw = Math.max(1, cw*0.6);
      const yo = yOf(d.open), yc = yOf(d.close);
      const top = Math.min(yo,yc), bh = Math.max(1, Math.abs(yc-yo));
      ctx.fillRect(x-bw/2, top, bw, bh);
    }
    // 均线 MA5/10/20（前端复用K线自算）
    const closes = k.map(d=>d.close);
    const maDefs = [[5,'#4fd6ff'],[10,'#e8b866'],[20,'#c77dff']];
    ctx.lineWidth = 1.3;
    maDefs.forEach(([p,color]) => {
      if (n < p) return;
      ctx.strokeStyle = color; ctx.beginPath();
      let started = false, sum = 0;
      for (let i=0;i<n;i++){
        sum += closes[i];
        if (i >= p) sum -= closes[i-p];
        if (i >= p-1){
          const x = padL + cw*(i+0.5), y = yOf(sum/p);
          started ? ctx.lineTo(x,y) : (ctx.moveTo(x,y), started=true);
        }
      }
      ctx.stroke();
    });
    // 均线图例
    ctx.font = '11px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    let lx = padL + 4;
    maDefs.forEach(([p,color]) => {
      if (n < p) return;
      ctx.fillStyle = color;
      ctx.fillText('MA'+p, lx, padT+2);
      lx += 42;
    });
  }

  // 事件绑定：卡片点击
  quotesWrap.addEventListener('click', (e) => {
    const del = e.target.closest('.qdel');
    if (del) { e.stopPropagation(); removeWatch(del.dataset.del); return; }
    const card = e.target.closest('.qcard'); if (card) openKline(card.dataset.symbol);
  });
  moversWrap.addEventListener('click', (e) => {
    const row = e.target.closest('.mv-row'); if (row) openKline(row.dataset.symbol);
  });

  // 自选拖拽排序
  let dragSym = null;
  quotesWrap.addEventListener('dragstart', (e) => {
    const card = e.target.closest('.qcard'); if (!card) return;
    dragSym = card.dataset.symbol; card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  quotesWrap.addEventListener('dragend', (e) => {
    const card = e.target.closest('.qcard'); if (card) card.classList.remove('dragging');
    quotesWrap.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
  });
  quotesWrap.addEventListener('dragover', (e) => {
    e.preventDefault();
    const card = e.target.closest('.qcard');
    quotesWrap.querySelectorAll('.drag-over').forEach(c => { if (c !== card) c.classList.remove('drag-over'); });
    if (card && card.dataset.symbol !== dragSym) card.classList.add('drag-over');
  });
  quotesWrap.addEventListener('drop', async (e) => {
    e.preventDefault();
    const target = e.target.closest('.qcard');
    quotesWrap.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
    if (!target || !dragSym || target.dataset.symbol === dragSym) return;
    // 只允许同分类(市场)内排序，跨组不处理
    const order = lastItems.map(i => i.symbol);
    const from = order.indexOf(dragSym), to = order.indexOf(target.dataset.symbol);
    if (from < 0 || to < 0) return;
    order.splice(to, 0, order.splice(from, 1)[0]);
    // 乐观重排 lastItems 并重渲染
    lastItems.sort((a,b) => order.indexOf(a.symbol) - order.indexOf(b.symbol));
    renderQuotes(lastItems);
    try {
      await fetch('/api/finance/watchlist/reorder', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ order })
      });
      showToast('自选顺序已保存', 'ok');
    } catch (err) { showToast('排序保存失败', 'err'); }
    dragSym = null;
  });
  document.getElementById('kClose').addEventListener('click', closeKline);
  modal.addEventListener('click', (e) => { if (e.target === modal) closeKline(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeKline(); });
  document.querySelectorAll('.pbtn').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('.pbtn').forEach(x => x.classList.remove('active'));
    b.classList.add('active'); curPeriod = b.dataset.period; loadKline();
  }));
  document.querySelectorAll('.mtab').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));

  // A4: 异动提示条（轮询 /alerts + 跑马灯）
  const alertBar = document.getElementById('alertBar');
  const alertTrack = document.getElementById('alertTrack');
  let lastAlertId = 0;
  function fmtAlertTime(ts) {
    const t = new Date(ts * 1000 + (new Date().getTimezoneOffset() + 480) * 60000);
    return pad(t.getHours()) + ':' + pad(t.getMinutes());
  }
  function renderAlerts(items) {
    if (!items || !items.length) {
      alertBar.classList.remove('active');
      alertTrack.innerHTML = '<span class="alert-empty">盘面平静，暂无异动</span>';
      return;
    }
    const build = () => items.map(a => {
      const cls = a.direction === 'up' ? 'up' : 'down';
      const arrow = a.direction === 'up' ? '↑' : '↓';
      const sign = a.pct > 0 ? '+' : '';
      return '<span class="alert-item ' + cls + '">' +
        '<span class="a-name">' + a.name + '</span>' +
        '<span class="a-win">' + a.window + '</span>' +
        '<span class="a-pct">' + arrow + ' ' + sign + a.pct.toFixed(2) + '%</span>' +
        '<span class="a-time">' + fmtAlertTime(a.ts) + '</span></span>';
    }).join('');
    // 跑马灯需要重复一份实现无缝滚动
    alertTrack.innerHTML = '<span class="alert-run">' + build() + build() + '</span>';
    alertBar.classList.add('active');
  }
  async function refreshAlerts() {
    try {
      const r = await fetch('/api/finance/alerts?limit=20');
      const d = await r.json();
      const items = d.items || [];
      // 有新报警时闪一下
      if (items.length && items[0].id > lastAlertId) {
        const isFirst = lastAlertId === 0;
        lastAlertId = items[0].id;
        alertBar.style.transition = 'none';
        alertBar.classList.add('active');
        if (!isFirst && soundOn) playBeep(items[0].direction);
      }
      renderAlerts(items);
    } catch (e) { /* 静默 */ }
  }
  refreshAlerts();
  setInterval(refreshAlerts, 20000);
</script>

<script>
  // cobe.js 加载完后初始化（多重保障：尺寸就绪后才创建）
  function tryInitGlobe() {
    if (typeof window.createGlobe === 'function') initGlobe(0);
    else setTimeout(tryInitGlobe, 100);
  }
  if (document.readyState === 'complete' || document.readyState === 'interactive') tryInitGlobe();
  else window.addEventListener('DOMContentLoaded', tryInitGlobe);
  window.addEventListener('load', () => { if (!globeInited) initGlobe(0); });
</script>
